{% extends "sbadmin/base.html" %}
{% load custom_tags %}
{% block title %}Vendors{% endblock %}

{% block content %}
<div class="content-wrapper">
  <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>View Purchases</h1>
        </div>
        <div class="col-sm-6">
            <div class="float-right">
             <div class="btn-group float-right">
                    <button type="button" id="main-action-btn" class="btn btn-outline-success"><i class="fas fa-bars fa-sm mr-1 text-sm"></i>Actions</button>
                    <button type="button" class="btn btn-outline-success dropdown-toggle dropdown-toggle-split"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="sr-only">Toggle Dropdown</span>
                    </button>

                    <div class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item" href="{% url 'create_order' %}"><i class="fas fa-plus fa-sm mr-1"></i> Add New</a>
                        <a class="dropdown-item" href="#"><i class="fas fa-upload fa-sm mr-1"></i> Import</a>
                        <a class="dropdown-item" href="#" download="true"><i class="fas fa-download fa-sm mr-1"></i> Export</a>

                    </div>
             </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <section class="content">
    <div class="card card-outline">
       <div class="card-header">
          <div class="col-sm-3 float-left">

            <form method="get">
              <div class="position-relative d-inline-block" style="width: 300px;">
                <input type="text" class="form-control pr-4" name="q" placeholder="Type to search..." id="searchInput">
                <button class="btn btn-sm text-secondary position-absolute" id="clearSearch"
                        style="top: 50%; right: 10px; transform: translateY(-50%); padding: 0;"
                        title="Clear Search">
                  <i class="fas fa-times-circle"></i>
                </button>
              </div>
            </form>
          </div>
          <div class=" float-right">
            <button type="button" style="display: none;"  id="bulkDeleteBtn"
                    class="btn btn-outline-danger btn-sm" title="Delete selected records"
                    onclick="deleteSelected()">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
      </div>

      <div class="card-body p-0">
          <div id="tabuar-table"></div>

      </div>
        <div class="card-footer pl-1">
            <div id="page-info" class="text-bold  small px-2 py-1"></div>
        </div>
    </div>
  </section>
</div>

{% block footer_scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    let total = 0;
    const getQueryParam = (name) => {
        return new URLSearchParams(window.location.search).get(name) || '';
    };
    const searchInput = document.getElementById('searchInput');

  const table = new Tabulator("#tabuar-table", {
        height:"400px",
      layout: "fitColumns",
      placeholder:"No Records found",
      ajaxURL: "{% url 'all_purchases_json' %}",
      ajaxConfig: "GET",
      pagination: true,
      paginationMode: "remote", movableColumns: true,
      paginationSize: 20,
      paginationCounter: "pages",
      paginationSizeSelector: [20, 30, 40, 50], // max 50 allowed
      sortMode: "local",
      filterMode: "remote",
      selectableRows: true,
      ajaxParams: function(params){
            // Add the current 'q' value from the URL to the AJAX parameters
            params = params ?? {};
            params.q = getQueryParam('q');
            return params;
        },
      ajaxResponse:function(url, params, response){
          total = response.total;
          return {
              data: response.data|| [],        // row array
              last_page: response.last_page,  // total pages
              row_count: response.total,
          };
      },

      columns:[
          {formatter:"rowSelection",headerTooltip:"Select All", titleFormatter:"rowSelection",
              headerHozAlign:"center",
              hozAlign:"center", headerSort:false,
              width:40},
          {
                title: "Order No",
                field: "po_number",
                width: 110,
                headerHozAlign: "center",
                hozAlign: "center",
                formatter: function (cell) {
                    const po_id = cell.getData().po_id;
                    const po_number = cell.getValue();
                    const url = "{% url 'create_order' 0 %}".replace("0", po_id);

                    return `<a href="${url}" class="text-primary font-weight-bold">${po_number}</a>`;
                }
            },
          {title:"Order Date", field:"order_date", width:100},
          {title:"Delivery Date", field:"delivery_date" , hozAlign:"center", width:120},
          {title:"Vendor Name", field:"vendor_name",hozAlign:"center",width:120,headerHozAlign:"center"},
          {title:"Reference", field:"vendor_reference",hozAlign:"center",width:110,headerHozAlign:"center"},
          {
                title: "Status",
                field: "status_id",
                width: 120,
                hozAlign: "center",
                headerHozAlign: "center",
                formatter: function (cell) {
                    const status = cell.getValue();

                    const statusMap = {
                        0: "Created",
                        1: "Approved",
                        2: "Cancelled",
                        3: "Completed"
                    };

                    return `<span class="badge badge-pill badge-info">${statusMap[status] || "Unknown"}</span>`;
                }
          },
          {title:"Warehouse", field:"warehouse_name",hozAlign:"center",width:150,headerHozAlign:"center"},
          {title:"Currency", field:"currency_code",hozAlign:"center",width:90,headerHozAlign:"center"},
          {title:"Total", field:"total_val",hozAlign:"center",width:120,headerHozAlign:"center"},
          {title:"", width:70, hozAlign:"center",headerHozAlign:"center", headerSort:false, formatter:(cell)=>{
              const po_id = cell.getValue();
              const url = "{% url 'create_order' 0 %}".replace("0", po_id);
              return `<button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${po_id})"><i class="fas fa-trash-alt"></i></button>`;
          }}
      ]
  });
  const bulkDeleteBtn = document.getElementById("bulkDeleteBtn");
  if (bulkDeleteBtn) {
      table.on("rowSelectionChanged", function (data) {
          bulkDeleteBtn.style.display = data.length > 0 ? "inline-block" : "none";
      });
    }
    table.on("dataLoaded", function(p){
        document.getElementById("page-info").innerText =
          ` Total Records: ${total}`;
    });
    document.getElementById('clearSearch')?.addEventListener('click', function(event) {
    event.preventDefault(); // Stop form submission

    searchInput.value = '';
    const url = new URL(window.location);
    url.searchParams.delete("q");
    history.replaceState({}, "", url);

    table.setPage(1);
    searchInput.focus();
});

    document.querySelector('[name="q"]')?.addEventListener("input", e=>{
      const q = e.target.value.trim();
        const url = new URL(window.location);
        if (q === "") {
            url.searchParams.delete("q");
        } else {
            url.searchParams.set("q", q);
        }

        history.replaceState({}, "", url);


        table.setPage(1);
      });

      window.deleteProduct = pid=>{ return;
          Swal.fire({
            title: "Delete Product?",
            text: "This action cannot be undone.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33",
            confirmButtonText: "Delete"
        }).then(result => {
            if (!result.value) return;
            if (result.value) {
                // Note: Ensure this URL matches your urls.py pattern perfectly
                fetch("{% url 'delete_product_single' 0 %}".replace("0",pid), {
                    method: "DELETE",
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}",
                        "Accept": "application/json"
                    }
                })
                .then(r => r.json())
                .then(data => {
                    if(data.status){
                        Swal.fire("Deleted", "Product removed successfully", "success")
                        .then(() => table.setData());
                    } else {
                        Swal.fire("Error", data.message || "Something went wrong", "error");
                    }
                })
                .catch(() => Swal.fire("Error", "Server error", "error"));
            }
        });
      };

        window.deleteSelected = () => {
            const selectedIds = table.getSelectedData().map(r => r.product_id);
            if (!selectedIds.length) return;
            return;
            Swal.fire({
                title: "Delete Selected?",
                text: `You are about to delete ${selectedIds.length} products. This cannot be undone.`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                confirmButtonText: "Yes, delete them!"
            }).then((result) => {
                if (!result.value) return;
                if (result.value) {
                    fetch("{% url 'delete_products_bulk' %}", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": "{{ csrf_token }}"
                        },
                        body: JSON.stringify({ ids: selectedIds })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === "success") {
                            Swal.fire("Deleted!", "Products have been deleted.", "success")
                            .then(() => location.reload());
                        } else {
                            Swal.fire("Error", data.message || "Failed to delete.", "error");
                        }
                    })
                    .catch(error => Swal.fire("Error", "Server error occurred.", "error"));
                }
            });
        }
        });
</script>
<script>
document.getElementById("main-action-btn").addEventListener("click", function(e){
    e.preventDefault();   // stop form/button submitting
    e.stopPropagation();
    const splitBtn = this.nextElementSibling;
    $(splitBtn).dropdown("toggle");
});

</script>
<style>
    #tabuar-table .tabulator-col {
        background-color: #daecff;
        cursor: pointer;
    }
    @media (hover: hover) and (pointer: fine) {
         #tabuar-table .tabulator-row.tabulator-selectable:hover {
            background-color: #e5edf7;
            cursor: pointer;
        }
    }
    #tabuar-table .tabulator-row.tabulator-row-even {
        background-color: #eff1f3;
    }
    #tabuar-table .tabulator-footer {
        background-color: #fafafa;
        border-top: 1px solid #999;
    }
    #tabuar-table .tabulator {
        background-color: #ffffff;
        border: 1px solid #e7e6e6;
     }
.tabulator {
    background-color: #ffffff;
}
</style>
{% endblock %}

{% endblock %}
