{% extends "sbadmin/base.html" %}
{% load custom_tags %}
{% block title %}All Purchases{% endblock %}

{% block content %}
<div class="content-wrapper">
  <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">

  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>All Purchases</h1>
        </div>
<script>
    $(document).ready(function(){
        $(".btn-customize-model").click(function(){
            const STORAGE_KEY = "purchase_order_columns";
            const savedPrefs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            const columns = [
                //{ id: "order_date", label: "Order Date" },
                //{ id: "delivery_date", label: "Delivery Date" },
                { id: "vendor_name", label: "Vendor Name" },
                { id: "vendor_delivery_date", label: "Vendor Delivery Date" },
                { id: "po_vendor_ref", label: "Vendor PO#" },
                { id: "vendor_reference", label: "Reference" },
               // { id: "status_id", label: "Status" },
                { id: "warehouse_name", label: "Warehouse" },
                { id: "currency_code", label: "Currency" },
                { id: "grand_total", label: "Total Amount" },
                { id: "total_order_qty", label: "Ordered QTY" },
                { id: "total_received_qty", label: "Received QTY" },
                { id: "po_vendor_po_number", label: "Vendor Order No" },
                { id: "po_vendor_order_date", label: "Vendor PO Order Date" },
                { id: "po_vendor_invoice_ref_number", label: "Vendor Invoice No" },
                { id: "vendor_shipping_tracking_no", label: "Tracking No" },
                { id: "vendor_shipping_company", label: "Shipping Company" },
                { id: "vendor_shipping_tracking_link", label: "Tracking Link" },
                { id: "vendor_shipping_date", label: "Shipping Date" },
                { id: "po_vendor_delivery_ref_number", label: "Vendor Delivery Ref" }
            ];

            let html = '<table class="table table-sm table-borderless">';
            columns.forEach(col => {
                const isChecked = savedPrefs[col.id] === true ? 'checked' : '';
                html += `
                    <tr>
                        <td>
                            <div class="icheck-primary">
                                <input type="checkbox" id="col_${col.id}" data-field="${col.id}" ${isChecked}>
                                <label for="col_${col.id}">${col.label}</label>
                            </div>
                        </td>
                    </tr>`;
            });

            html += '</table>';

            $("#modal-col-list").html(html);
            $("#columnModal").modal("show");
        });

    $(".saveColumnPrefs").on("click", function(){
        const columnPreferences = {
            //"order_date": document.getElementById("col_order_date").checked,
            //"delivery_date": document.getElementById("col_delivery_date").checked,
            "vendor_name": document.getElementById("col_vendor_name").checked,
            "vendor_delivery_date": document.getElementById("col_vendor_delivery_date").checked,
            "po_vendor_ref": document.getElementById("col_po_vendor_ref").checked,
            "vendor_reference": document.getElementById("col_vendor_reference").checked,
           // "status_id": document.getElementById("col_status_id").checked,
            "warehouse_name": document.getElementById("col_warehouse_name").checked,
            "currency_code": document.getElementById("col_currency_code").checked,
            "grand_total": document.getElementById("col_grand_total").checked,
            "total_order_qty": document.getElementById("col_total_order_qty").checked,
            "total_received_qty": document.getElementById("col_total_received_qty").checked,
            //"po_vendor_po_number": document.getElementById("col_po_vendor_po_number").checked,
            "po_vendor_order_date": document.getElementById("col_po_vendor_order_date").checked,
            "po_vendor_invoice_ref_number": document.getElementById("col_po_vendor_invoice_ref_number").checked,
            "vendor_shipping_tracking_no": document.getElementById("col_vendor_shipping_tracking_no").checked,
            "vendor_shipping_company": document.getElementById("col_vendor_shipping_company").checked,
            "vendor_shipping_tracking_link": document.getElementById("col_vendor_shipping_tracking_link").checked,
            "vendor_shipping_date": document.getElementById("col_vendor_shipping_date").checked,
            "po_vendor_delivery_ref_number": document.getElementById("col_po_vendor_delivery_ref_number").checked
        };
        localStorage.setItem("purchase_order_columns", JSON.stringify(columnPreferences));

        // 4. Close modal and notify user
        $('#columnModal').modal('hide');
        toastr.success("Preferences Saved. Reloading to apply your changes...")
        setTimeout(function(){ location.reload(); }, 1200)
      });
    });
</script>
  <div class="modal fade" id="columnModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-dialog-scrollable" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Customize View</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-col-list" class="list-group">

                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary btn-block saveColumnPrefs" id="saveColumnPrefs">Save Preferences</button>
            </div>
        </div>
    </div>
</div>

        <div class="col-sm-6">
            <div class="float-right">
                  <button type="button"  title="Customize columns"
                          class="help-text btn btn-customize-model btn-default btn-sm mr-2"><i class="fas fa-columns"></i>
                </button>
             <div class="btn-group float-right">

                    <button type="button" id="main-action-btn" class="btn btn-outline-success"><i class="fas fa-bars fa-sm mr-1 text-sm"></i>Actions</button>
                    <button type="button" class="btn btn-outline-success dropdown-toggle dropdown-toggle-split"
                            data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <span class="sr-only">Toggle Dropdown</span>
                    </button>

                    <div class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item" href="{% url 'create_order' %}"><i class="fas fa-plus fa-sm mr-1"></i> Add New</a>
                        <a class="dropdown-item" href="#"><i class="fas fa-upload fa-sm mr-1"></i> Import</a>
                        <a class="dropdown-item" href="#" ><i class="fas fa-download fa-sm mr-1"></i> Export</a>

                    </div>
             </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <section class="content">
    <div class="card card-outline">
       <div class="card-header">
          <div class="col-sm-3 float-left">

            <form method="get">
              <div class="position-relative d-inline-block" style="width: 300px;">
                <input type="text" class="form-control pr-4" name="q" placeholder="Type to search..." id="searchInput">
                <button class="btn btn-sm text-secondary position-absolute" id="clearSearch"
                        style="top: 50%; right: 10px; transform: translateY(-50%); padding: 0;"
                        title="Clear Search">
                  <i class="fas fa-times-circle"></i>
                </button>
              </div>
            </form>
          </div>
          <div class=" float-right">
            <button type="button" style="display: none;"  id="bulkDeleteBtn"
                    class="btn btn-outline-danger btn-sm" title="Delete selected records"
                    onclick="deleteSelected(event)">
                <i class="fas fa-trash"></i> Delete
            </button>
        </div>
      </div>

      <div class="card-body p-0">
          <div id="tabuar-table"></div>

      </div>
        <div class="card-footer pl-1">
            <div id="page-info" class="text-bold  small px-2 py-1"></div>
        </div>
    </div>
  </section>
</div>

{% block footer_scripts %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    const STORAGE_KEY = "purchase_order_columns";

    const defaultSettings = {
        "po_id": false,
        "order_date": false,
        "delivery_date": false,
        "vendor_name": false,
        "vendor_delivery_date": false,
        "po_vendor_ref": false,
        "vendor_reference": false,
        //"status_id": false,
        "warehouse_name": false,
        "currency_code": false,
        "grand_total": false,
        "total_order_qty": false,
        "total_received_qty": false,

        //"po_vendor_po_number": false,
        "po_vendor_order_date": false,
        "po_vendor_invoice_ref_number": false,
        "vendor_shipping_tracking_no": false,
        "vendor_shipping_company": false,
        "vendor_shipping_tracking_link": false,
        "vendor_shipping_date": false,
        "po_vendor_delivery_ref_number": false,
    };

    const savedPrefs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultSettings;
    const getVisibility = (field, defaultVisible) => {
        return savedPrefs.hasOwnProperty(field) ? savedPrefs[field] : defaultVisible;
    };
    let total = 0;
    const getQueryParam = (name) => {
        return new URLSearchParams(window.location.search).get(name) || '';
    };
    const searchInput = document.getElementById('searchInput');

  const table = new Tabulator("#tabuar-table", {
        height:"400px",
      layout: "fitColumns",
      placeholder:"No Records found",
      ajaxURL: "{% url 'all_purchases_json' %}",
      ajaxConfig: "GET",
      pagination: true,
      paginationMode: "remote", movableColumns: true,
      paginationSize: 20,
      paginationCounter: "pages",
      paginationSizeSelector: [20, 30, 40, 50], // max 50 allowed
      sortMode: "local",
      filterMode: "remote",
      selectableRows: true,
      ajaxParams: function(params){
            // Add the current 'q' value from the URL to the AJAX parameters
            params = params ?? {};
            params.q = getQueryParam('q');
            return params;
        },
      ajaxResponse:function(url, params, response){
          total = response.total;
          return {
              data: response.data|| [],        // row array
              last_page: response.last_page,  // total pages
              row_count: response.total,
          };
      },

      columns:[
          { title: "ID", field: "po_id", visible: false },
          { formatter:"rowSelection", minWidth:40, hozAlign:"center" , headerSort:false},
          { title:"Order Date", field:"order_date",formatter: function(cell){
                return formattedDate(cell.getValue(), "/");
              }, minWidth:100, headerSort:false},
          { title: "PO#",
                field: "po_number",
                minWidth: 110,
                headerHozAlign: "center",
                hozAlign: "center",
                formatter: function (cell) {
                    const po_id = cell.getData().po_id;
                    const po_number = cell.getValue();
                    const url = "{% url 'view_po_order' 0 %}".replace("0", po_id);

                    return `<a href="${url}" class="text-primary font-weight-bold">${po_number}</a>`;
                }
            },

          { title:"Delivery Date-ETA",visible: true, formatter: function(cell){
                return formattedDate(cell.getValue(), "/");
              }, field:"delivery_date" , hozAlign:"center", minWidth:120, headerSort:false},
          { title:"Vendor Name", visible: getVisibility("vendor_name", true), field:"vendor_name",hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false},



          { title:"Vendor Order No", field:"po_vendor_po_number", visible: true, hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false},
          { title:"Vendor PO Order Date", field:"po_vendor_order_date", visible: getVisibility("po_vendor_order_date", true), hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false, formatter: function(cell){
                return formattedDate(cell.getValue(), "/");
              }},
          { title:"Vendor Invoice No", field:"po_vendor_invoice_ref_number", visible: getVisibility("po_vendor_invoice_ref_number", true), hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false},
          { title:"Vendor Delivery Ref", field:"po_vendor_delivery_ref_number", visible: getVisibility("po_vendor_delivery_ref_number", true), hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false},
          { title:"Vendor Shipping Company", field:"vendor_shipping_company", visible: getVisibility("vendor_shipping_company", true), hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false},
          { title:"Vendor Tracking No", field:"vendor_shipping_tracking_no", visible: getVisibility("vendor_shipping_tracking_no", true),  hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false},
          { title:"Vendor Tracking Link", field:"vendor_shipping_tracking_link", visible: getVisibility("vendor_shipping_tracking_link", true), hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false, formatter: function (cell) {
                const tracking_link = cell.getValue();
                return (tracking_link.length >=3)?`<a target="_blank" class="link text-primary text-underline" href="${tracking_link}">Track</a>`:"--";
          }},
          {title:"Vendor Shipping Date", visible: getVisibility("vendor_shipping_date", true), field:"vendor_shipping_date",hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false, formatter: function (cell) {
                return formattedDate(cell.getValue());
          }},
          {title:"Vendor Delivery Date", visible: getVisibility("vendor_delivery_date", true), field:"vendor_delivery_date",hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false, formatter: function (cell) {
                return formattedDate(cell.getValue());
          }},
          { title:"Vendor PO#",visible: getVisibility("po_vendor_ref", true), field:"po_vendor_ref",hozAlign:"center",minWidth:220,headerHozAlign:"center", headerSort:false},
          { title:"Reference",visible: getVisibility("vendor_reference", true), field:"vendor_reference",hozAlign:"center",minWidth:110,headerHozAlign:"center", headerSort:false},
          { title: "Status",visible: true,
                field: "status_id",
                minWidth: 120,
                hozAlign: "center",
                headerHozAlign: "center", headerSort:false,
                formatter: function (cell) {
                    const status = cell.getValue();

                    const statusMap = {
                        0: "New",
                        1: "Approved",
                        2: "Delivered",
                        3: "Back Order",
                        4: "Cancelled",
                        5: "Archieved"
                    };

                    return `<span class="badge badge-pill badge-info">${statusMap[status] || "Unknown"}</span>`;
                }
          },
          {title:"Warehouse",visible: getVisibility("warehouse_name", true), headerSort:false, field:"warehouse_name",hozAlign:"center",width:150,headerHozAlign:"center"},
          {title:"Currency", visible: getVisibility("currency_code", true), headerSort:false, field:"currency_code",hozAlign:"center",width:90,headerHozAlign:"center"},
          {title:"Total", visible: getVisibility("grand_total", true), field:"grand_total",hozAlign:"center",width:120,headerHozAlign:"center", formatter: "money",
            formatterParams: { symbol: "$",  precision: 2 }},
          {title:"Ordered QTY", visible: getVisibility("total_order_qty", true),field:"total_order_qty",hozAlign:"center",width:120,headerHozAlign:"right"},
          {title:"Received QTY",visible: getVisibility("total_received_qty", true), field:"total_received_qty",hozAlign:"center",width:120,headerHozAlign:"right"},
          {title:"", width:70, hozAlign:"center",headerHozAlign:"center", headerSort:false, formatter:(cell)=>{
              const po_id = cell.getRow().getData().po_id;
              const url = "{% url 'create_order' 0 %}".replace("0", po_id);
              return `<button type="button" class="btn btn-sm btn-outline-danger" onclick="deletePO(${po_id},event)"><i class="fas fa-trash-alt"></i></button>`;
          },
            cellClick:function(e){
                e.stopPropagation();  // ✔ avoid row-selection on delete
            }}
      ]
  });
  const bulkDeleteBtn = document.getElementById("bulkDeleteBtn");
  if (bulkDeleteBtn) {
      table.on("rowSelectionChanged", function (data) {
          bulkDeleteBtn.style.display = data.length > 0 ? "inline-block" : "none";
      });
    }
    table.on("dataLoaded", function(p){
        document.getElementById("page-info").innerText =
          ` Total Records: ${total}`;
    });
    document.getElementById('clearSearch')?.addEventListener('click', function(event) {
    event.preventDefault(); // Stop form submission

    searchInput.value = '';
    const url = new URL(window.location);
    url.searchParams.delete("q");
    history.replaceState({}, "", url);

    table.setPage(1);
    searchInput.focus();
});

    document.querySelector('[name="q"]')?.addEventListener("input", e=>{
      const q = e.target.value.trim();
        const url = new URL(window.location);
        if (q === "") {
            url.searchParams.delete("q");
        } else {
            url.searchParams.set("q", q);
        }

        history.replaceState({}, "", url);


        table.setPage(1);
      });

      window.deletePO =(pid, event)=>{
          event.stopPropagation();
          event.preventDefault();
          Swal.fire({
            title: "Delete PO?",
            text: "This action cannot be undone.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33",
            confirmButtonText: "Delete"
        }).then(result => {
            if (!result.value) return;
            if (result.value) {
                // Note: Ensure this URL matches your urls.py pattern perfectly
                fetch("{% url 'delete_po_single' 0 %}".replace("0",pid), {
                    method: "DELETE",
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}",
                        "Accept": "application/json"
                    }
                })
                .then(r => r.json())
                .then(data => {
                    if(data.status){
                        Swal.fire("Deleted", "PO removed successfully", "success")
                        .then(() => table.setData());
                    } else {
                        Swal.fire("Error", data.message || "Something went wrong", "error");
                    }
                })
                .catch(() => Swal.fire("Error", "Server error", "error"));
            }
        });
      };

        window.deleteSelected = (e) => {
            e.stopPropagation();  e.preventDefault();
            const selectedIds = table.getSelectedData().map(r => r.po_id);
            if (!selectedIds.length) return;

            Swal.fire({
                title: "Delete Selected?",
                text: `You are about to delete ${selectedIds.length} Orders. This cannot be undone.`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                confirmButtonText: "Yes, delete them!"
            }).then((result) => {
                return;
                if (!result.value) return;
                if (result.value) {
                    fetch("{% url 'delete_products_bulk' %}", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": "{{ csrf_token }}"
                        },
                        body: JSON.stringify({ ids: selectedIds })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === "success") {
                            Swal.fire("Deleted!", "Products have been deleted.", "success")
                            .then(() => location.reload());
                        } else {
                            Swal.fire("Error", data.message || "Failed to delete.", "error");
                        }
                    })
                    .catch(error => Swal.fire("Error", "Server error occurred.", "error"));
                }
            });
        }
        });
</script>
<script>
document.getElementById("main-action-btn").addEventListener("click", function(e){
    e.preventDefault();   // stop form/button submitting
    e.stopPropagation();
    const splitBtn = this.nextElementSibling;
    $(splitBtn).dropdown("toggle");
});

</script>
<style>
    #tabuar-table .tabulator-footer {
        background-color: #fafafa;
        border-top: 1px solid #999;
    }
    #tabuar-table .tabulator {
        background-color: #ffffff;
        border: 1px solid #e7e6e6;
     }
.tabulator {
    background-color: #ffffff;
}
</style>

{% endblock %}

{% endblock %}
