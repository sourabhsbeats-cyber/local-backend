{% block footer_scripts %}
<script>
let table = null;
function applyChildBorders(table) {
    // 1. Clear all box-related classes first
    document.querySelectorAll(".child-first, .child-last, .parent-expanded-box")
        .forEach(el => el.classList.remove("child-first", "child-last", "parent-expanded-box"));

    table.getRows().forEach(parentRow => {
        const data = parentRow.getData();

        // 2. Identify expanded parents and their children
        if (data.sub_pos && data.sub_pos.length > 1 && parentRow.isTreeExpanded()) {
            // Add class to the parent row to start the box top
            parentRow.getElement().classList.add("parent-expanded-box");

            const children = parentRow.getTreeChildren();
            if (children.length) {
                children[0].getElement().classList.add("child-first");
                children[children.length - 1].getElement().classList.add("child-last");
            }
        }
    });
}
function getFilterParams() {
    return {
        status: document.getElementById("filter_status").value,
        order_no: document.getElementById("filter_order_no").value.trim(),
        vendor_id: document.getElementById("filter_vendor").value,
        vendor_ref: document.getElementById("filter_vendor_ref").value.trim(),
        warehouse: document.getElementById("filter_warehouse").value,
        supplier_ref: document.getElementById("filter_supplier_ref").value.trim(),
        vendor_payment_status: document.getElementById("filter_vendor_payment_status").value.trim(),
    };
}
</script>

        document.querySelector('[name="q"]')?.addEventListener("input", e=>{
      const q = e.target.value.trim();
        const url = new URL(window.location);
        if (q === "") {
            url.searchParams.delete("q");
        } else {
            url.searchParams.set("q", q);
        }

        history.replaceState({}, "", url);


        table.setPage(1);
      });
        window.deletePO =(pid, event)=>{
          event.stopPropagation();
          event.preventDefault();
          Swal.fire({
            title: "Delete PO?",
            text: "This action cannot be undone.",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33",
            confirmButtonText: "Delete"
        }).then(result => {
            if (!result.value) return;
            if (result.value) {
                // Note: Ensure this URL matches your urls.py pattern perfectly
                fetch("{% url 'delete_po_single' 0 %}".replace("0",pid), {
                    method: "DELETE",
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}",
                        "Accept": "application/json"
                    }
                })
                .then(r => r.json())
                .then(data => {
                    if(data.status){
                        Swal.fire("Deleted", "PO removed successfully", "success")
                        .then(() => table.setData());
                    } else {
                        Swal.fire("Error", data.message || "Something went wrong", "error");
                    }
                })
                .catch(() => Swal.fire("Error", "Server error", "error"));
            }
        });
      };
        window.deleteSelected = (e) => {
            e.stopPropagation();  e.preventDefault();
            const selectedIds = table.getSelectedData().map(r => r.po_id);
            if (!selectedIds.length) return;

            Swal.fire({
                title: "Delete Selected?",
                text: `You are about to delete ${selectedIds.length} Orders. This cannot be undone.`,
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#d33",
                confirmButtonText: "Yes, delete them!"
            }).then((result) => {
                return;
                if (!result.value) return;
                if (result.value) {

                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": "{{ csrf_token }}"
                        },
                        body: JSON.stringify({ ids: selectedIds })
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === "success") {

                            .then(() => location.reload());
                        } else {
                            Swal.fire("Error", data.message || "Failed to delete.", "error");
                        }
                    })
                    .catch(error => Swal.fire("Error", "Server error occurred.", "error"));
                }
            });
        }
        });
</script>

    e.stopPropagation();

});
