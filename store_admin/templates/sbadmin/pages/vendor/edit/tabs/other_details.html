<div class="form-check mb-3 icheck-primary pl-0 no-selec">
    <input class="form-check-input"
           type="checkbox"
           name="registeredBusiness"
           id="registeredBusiness"
           {% if vendor.registered_business %}checked{% endif %} />
           
    <label class="form-check-label" for="registeredBusiness">
        This vendor has a registered business
    </label>
</div>

<div class="form-row">
    <div class="form-group col-md-4">
        <label>Company ABN</label>
        <input type="text"
               name="company_abn"
               class="form-control form-control-sm"
               value="{{ vendor.company_abn }}"
               placeholder="Enter ABN (11 digits)" />
    </div>

    <div class="form-group col-md-4">
        <label>Company ACN</label>
        <input type="text"
               name="company_acn"
               class="form-control form-control-sm"
               value="{{ vendor.company_acn | hide_none }}"
               placeholder="Enter ACN" />
    </div>

    <div class="form-group col-md-4">
        <label>Payment Terms</label>
        <select name="payment_term" class="form-control form-control-sm">
            <option value="">-- Select Payment Term --</option>
            {% for term in payment_terms %}
                <option value="{{ term.id }}"
                        {% if vendor.payment_term and vendor.payment_term.id == term.id %}
                            selected
                        {% endif %}>
                    {{ term.name }} ({{ term.frequency }} days)
                </option>
            {% endfor %}
        </select>
    </div>
</div>

<div class="form-row">
    <div class="form-group col-md-4">
        <label>Currency</label>
        <select name="currency" class="select2 form-control form-control-sm" style="height:22px">
            <option value="">-- Select Currency --</option>
            {% for c in currency_list %}
                <option value="{{ c.currency }}"
                        {% if vendor.currency == c.currency %}
                            selected
                        {% endif %}>
                    {{ c.currency }} - {{ c.currency_name }}
                </option>
            {% endfor %}
        </select>
    </div>
<div class="form-group col-md-4">
                     <label>Payment Method</label>
                     <select name="payment_method"
                             style="height:16px"
                             class="select2 form-control form-control-sm">
                        <option value="">-- Select Payment-type --</option>
                        <option {% if vendor.payment_method == 'Credit Card' %}selected{% endif %} value="Credit Card">Credit Card</option>
                       <option {% if vendor.payment_method == 'Direct' %}selected{% endif %} value="Direct">Direct</option>
                       <option {% if vendor.payment_method == 'Paypal' %}selected{% endif %} value="Paypal">Paypal</option>
                         <option {% if vendor.payment_method == 'Wallet' %}selected{% endif %} value="Wallet">Wallet</option>
                    </select>
                </div>
    <div class="form-group col-md-4">
        <label>Documents</label>

        {% if vendor.documents %}
            <p class="mb-1">
                <a href="{{ vendor.documents.url }}" target="_blank">
                    View current document
                </a>
            </p>
        {% endif %}

        <input type="file" name="documents" class="form-control-file">
    </div>
</div>
