<div class="col-md-8">
    <div class="form-row ">
     <div class="form-group col-md-2">
      <label ><strong>Vendor Type<strong></strong><span class="text-danger">*</span></label>
      <select class="form-control form-control-sm " name="vendor_type">
        <option value="">Select</option>
        <option {% if vendor.vendor_type == "Dropship" %}selected{% endif %} value="Dropship">Dropship</option>
        <option {% if vendor.vendor_type == "Wholesale" %}selected{% endif %} value="Wholesale">Wholesale</option>
        <option {% if vendor.vendor_type == "both" %}selected{% endif %} value="both">both</option>
      </select>
    </div>
</div>

    <div class="form-row">
            <div class="form-group col-md-2">
                <label>Salutation</label>
                <select id="salutation"  onchange="updateList()"  class="form-control form-control-sm" name="saluation">
                    <option value="">Select</option>
                    <option value="Mr."  {% if vendor.salutation == "Mr." %}selected{% endif %}>Mr.</option>
                    <option value="Mrs." {% if vendor.salutation == "Mrs." %}selected{% endif %}>Mrs.</option>
                    <option value="Ms."  {% if vendor.salutation == "Ms." %}selected{% endif %}>Ms.</option>
                    <option value="Dr."  {% if vendor.salutation == "Dr." %}selected{% endif %}>Dr.</option>
                </select>
            </div>
            <div class="form-group col-md-5">
              <label>First Name</label>
              <input type="text" id="first_name" name="first_name" value="{{ vendor.first_name }}" class=" form-control-sm form-control" placeholder="First Name" />
            </div>
            <div class="form-group col-md-5">
              <label>Last Name</label>
              <input type="text"  id="last_name" name="last_name" value="{{ vendor.last_name }}" class=" form-control-sm form-control" placeholder="Last Name" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group col-md-6">
              <label>Company Name</label>
              <input type="text" value="{{ vendor.company_name }}" name="company_name" class=" form-control-sm form-control" placeholder="Registered company name" />
            </div>
            <div class="form-group col-md-3">
                <label ><strong>Display Name</strong><span class="text-danger">*</span></label>
                <div id="display-container">
              <input type="text"
                     value="{{ vendor.display_name }}" id="display_name"
                       autocomplete="off"
                     name="display_name" class="typeahead  form-control-sm form-control "
                     placeholder="Select or type to add" /></div>
            </div>

           <div class="form-group col-md-3">
               <label ><strong>Vendor Code</strong><span class="text-danger">*</span></label>
              <input type="text" value="{{ vendor.vendor_code }}"  name="vendor_code" class=" form-control-sm form-control " placeholder="Select or type to add" />
            </div>

          </div>
            <input type="hidden" name="vendor_id" value="{{ vendor.id }}" />
          <div class="form-row">
            <div class="form-group col-md-6">
              <label>Email Address</label>
              <div class="input-group">
                <input type="text" value="{{ vendor.email_address }}"
                       autocomplete="off" name="email_address" class="form-control-sm form-control" placeholder="example@company.com" />
              </div>
            </div>
            <div class="form-group col-md-3">
              <label>Work Phone</label>
              <div class="input-group">
                <input type="text" value="{{ vendor.work_phone }}" name="work_phone" class="form-control-sm form-control" placeholder="Work Phone" />
              </div>
            </div>
            <div class="form-group col-md-3">
              <label>Mobile</label>
              <div class="input-group">
                <input type="text" name="mobile_number" value="{{ vendor.mobile_number }}" class="form-control-sm form-control" placeholder="Mobile Number" />
              </div>
            </div>
         </div>
</div>
<script>
  function getSuggestions() {
    const sal = $("#salutation").val().trim();
    const f   = $("#first_name").val().trim();
    const l   = $("#last_name").val().trim();

    let opts = [];

    if (f && l) {
        const prefix = sal ? sal + " " : "";

        opts.push(prefix + f + " " + l);   // Mr. San Jio
        opts.push(prefix + l + ", " + f);  // Mr. Jio, San
    }


    return opts;
}

var suggestionEngine = new Bloodhound({
    datumTokenizer: Bloodhound.tokenizers.whitespace,
    queryTokenizer: Bloodhound.tokenizers.whitespace,
    identify: obj => obj
});

// Default suggestion logic (YOUR REQUIREMENT)
function showDefaults(query, sync) {
    if (query === "") {
        sync(getSuggestions());    // show all suggestions when empty
    } else {
        // filter suggestions
        const all = getSuggestions();
        const filtered = all.filter(item =>
            item.toLowerCase().includes(query.toLowerCase())
        );
        sync(filtered);
    }
}

$("#display_name").typeahead(
    {
        minLength: 0,
        highlight: true
    },
    {
        name: "display-names",
        source: showDefaults
    }
);

// Trigger update whenever name fields change
$("#salutation, #first_name, #last_name").on("input blur", function () {
    $("#display_name").typeahead('val', ''); // reset input
    $("#display_name").typeahead('open');    // show new defaults
});
</script>
