<h6 class="font-weight-bold mb-3">Bank Details</h6>
<p class="text-muted small">Manage vendor Bank details below.</p>

<!-- Contact List -->
<div id="bank-list">
</div>

<!-- Add Button -->
<button type="button" class="btn btn-link btn-sm mt-2" id="addBankBtn">
  + Add Bank
</button>

<!-- MODAL POPUP -->
<div class="modal fade" id="bankModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Bank Details</h5>
        <button class="close" data-dismiss="modal">&times;</button>
      </div>

      <div class="modal-body">
        <div class="form-row">
          <div class="form-group col-sm-6">
            <label>Account Holder Name</label>
            <input type="text" id="account_holder" class="form-control">
          </div>
             <div class="form-group col-sm-6">
            <label>Bank Name</label>
            <input type="text" id="bank_name" class="form-control">
          </div>

        </div>
        <div class="form-row">
          <div class="form-group col-sm-6">
            <label>Account Number</label>
            <input type="text" id="account_number" class="form-control">
          </div>
            <div class="form-group col-sm-6">
            <label>Bic</label>
            <input type="text" id="bic" class="form-control">
          </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="saveNewBankBtn">Save</button>
      </div>
    </div>
  </div>
    </div>
</div>

<div class="modal fade" id="update_bankmodal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Bank Details</h5>
        <button class="close" data-dismiss="modal">&times;</button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="edit_vendor_id" value="{{vendor.id}}" />
          <input type="hidden" id="edit_bank_id" />

         <div class="form-row">
          <div class="form-group col-sm-6">
            <label>Account Holder Name</label>
            <input type="text" id="edit_account_holder" class="form-control">
          </div>
             <div class="form-group col-sm-6">
            <label>Bank Name</label>
            <input type="text" id="edit_bank_name" class="form-control">
          </div>

        </div>
        <div class="form-row">
          <div class="form-group col-sm-6">
            <label>Account Number</label>
            <input type="text" id="edit_account_number" class="form-control">
          </div>
            <div class="form-group col-sm-6">
            <label>Bic</label>
            <input type="text" id="edit_bic" class="form-control">
          </div>
      </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="saveEditBankBtn">Update</button>
      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const list = document.getElementById("bank-list");
    const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;
    const vendorId = {{ vendor.id }};
    const addModal = $("#bankModal");
    const editModal = $("#update_bankmodal");

    const DETAIL_URL = "{% url 'get_single_vendor_bank' vendor.id 9999 %}";
    const UPDATE_URL = "{% url 'update_vendor_bank' 9999 %}";
    const ADD_URL = "{% url 'add_new_vendor_bank' vendor.id %}";

    const addFields = {
      account_holder: "account_holder",
      bank_name: "bank_name",
      account_number: "account_number",
      bic: "bic",
    };

    const editFields = {
      id: "edit_bank_id",
      account_holder: "edit_account_holder",
      bank_name: "edit_bank_name",
      account_number: "edit_account_number",
      bic: "edit_bic",
    };

    const formToData = (fields) => {
      const fd = new FormData();
      Object.entries(fields).forEach(([key, id]) => {
        fd.append(key, document.getElementById(id).value);
      });
      return fd;
    };

    const resetForm = (fields) => {
      Object.values(fields).forEach(id => document.getElementById(id).value = "");
    };

    const alertBox = (title, message, icon) =>
      Swal.fire(title, message, icon);

    // ------------- LOAD -------------
    function loadBanks() {
      list.innerHTML = "";
      fetch("{% url 'get_all_vendor_banks' vendor.id %}")
        .then(r => r.json())
        .then(data => {
          if (!data.status) return;
          data.data.forEach(c => {
            list.insertAdjacentHTML("beforeend", `
              <div class="bank-item border rounded p-2 mb-2 bg-light" data-id="${c.id}">
                <div class="d-flex justify-content-between">
                  <div>
                    <strong>${c.account_holder} ${c.bank_name}</strong>
                    <small class="text-muted d-block">${c.account_number || ""} | ${c.bic || ""}</small>
                  </div>
                  <div>
                    <button type="button" class="btn btn-sm btn-primary edit-bank"><i class="fas fa-pen"></i></button>
                    <button type="button" class="btn btn-sm btn-danger delete-bank-btn"><i class="far fa-trash-alt"></i></button>
                  </div>
                </div>
              </div>`);
          });
        });
    }

    // ------------- ADD -------------
    document.getElementById("addBankBtn").onclick = () => addModal.modal("show");

    document.getElementById("saveNewBankBtn").onclick = () => {
      const fd = formToData(addFields);
      fd.append("vendor_id", vendorId);

      fetch(ADD_URL, { method: "POST", body: fd, headers: { "X-CSRFToken": csrf } })
        .then(r => r.json())
        .then(data => {
          alertBox(data.status ? "Added" : "Error", data.message, data.status ? "success" : "error");
          if (data.status) {
            addModal.modal("hide");
            resetForm(addFields);
            loadBanks();
          }
        });
    };

    // ------------- EDIT UI -------------
    list.addEventListener("click", (e) => {
      const parent = e.target.closest(".bank-item");
      if (!parent) return;
      const id = parent.dataset.id;

      if (e.target.closest(".edit-bank")) {
        fetch(DETAIL_URL.replace("9999", id))
          .then(r => r.json())
          .then(data => {
            if (!data.status) return;
            Object.entries(editFields).forEach(([key, idName]) => {
              document.getElementById(idName).value = data.data[key] || "";
            });
            editModal.modal("show");
          });
      }

      // ------------- DELETE -------------
      if (e.target.closest(".delete-bank-btn")) {
        Swal.fire({
          title: "Delete Bankdetails?",
          text: "This cannot be undone.",
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: "Delete"
        }).then(res => {
          if (!res.value) return;
          fetch(`/vendor/bank/delete/${id}/${vendorId}`, {
            method: "DELETE",
            headers: { "X-CSRFToken": csrf }
          })
          .then(r => r.json())
          .then(data => {
            alertBox(data.status ? "Deleted" : "Error", data.message, data.status ? "success" : "error");
            if (data.status) loadBanks();
          });
        });
      }
    });

    // ------------- EDIT SUBMIT -------------
    document.getElementById("saveEditBankBtn").onclick = () => {
      const id = document.getElementById("edit_bank_id").value;
      const fd = formToData(editFields);
      fd.append("vendor_id", vendorId)
      fetch(UPDATE_URL.replace("9999", id), {
        method: "POST", body: fd, headers: { "X-CSRFToken": csrf }
      })
        .then(r => r.json())
        .then(data => {
          alertBox(data.status ? "Updated" : "Error", data.message, data.status ? "success" : "error");
          if (data.status) {
            editModal.modal("hide");
            resetForm(editFields);
            loadBanks();
          }
        });
    };

    loadBanks();
});
</script>
