<div class="row">
    <div class="col-md-6">
         <h6 class="mb-3 font-weight-bold">Billing Address</h6>
        <div class="form-group">
            <label>Attention</label>
            <input type="text" name="billing_attention_name"
                   class="form-control form-control-sm"
                   value="{{ billing.attention_name| hide_none  }}">
        </div>

        <div class="form-group">
            <label>Country / Region</label>
             <select name="billing_country" id="billing_country"
                    class="form-control form-control-sm select2" style="width: 100%">
                <option value="">-- Select Country --</option>
                {% for c in countries_list %}
                    <option value="{{ c.id }}"
                            {% if billing.country_id == c.id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                {% endfor %}
            </select>

        </div>

        <div class="form-group">
            <label>Building / Street</label>
            <textarea name="billing_street1" class=" form-control-sm form-control mb-2" rows="2">{{ billing.street1 | hide_none }}</textarea>
            <textarea name="billing_street2" class="form-control form-control-sm" rows="2">{{ billing.street2 | hide_none }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>State</label>

                <select name="billing_state" style="width: 100%"
                        class="form-control form-control-sm select2">
                    <option value="">select</option>
                    {% for c in billing_state_list %}
                    <option value="{{ c.id }}"
                        {% if billing.state_id == c.id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group col-md-6">
                <label>City</label>
                <input type="text" class="form-control form-control-sm"
                       name="billing_city" value="{{ billing.city| hide_none  }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>ZIP Code</label>
                <input type="text" class="form-control form-control-sm"
                       name="billing_zip" value="{{ billing.zip | hide_none }}">
            </div>

            <div class="form-group col-md-6">
                <label>Phone</label>
                <input type="text" class="form-control form-control-sm"
                       name="billing_phone" value="{{ billing.phone| hide_none  }}">
            </div>
        </div>

        <div class="form-group">
            <label>Fax Number</label>
            <input type="text" class="form-control form-control-sm"
                   name="billing_fax" value="{{ billing.fax| hide_none  }}">
        </div>
    </div>

    <!-- ========================= SHIPPING ADDRESS ========================= -->
    <div class="col-md-6">

        <div class="d-flex align-items-center mb-3">
            <h6 class="mb-0 font-weight-bold">Shipping Address</h6>
            <a href="#" id="copyBilling" class="ml-2 text-primary small">
            </a>
        </div>

        <div class="form-group">
            <label>Attention</label>
            <input type="text" name="shipping_attention_name"
                   class="form-control form-control-sm"
                   value="{{ shipping.attention_name | hide_none }}">
        </div>

        <div class="form-group">
            <label>Country / Region</label>
            <select name="shipping_country" id="shipping_country"
                    class="form-control  form-control-sm select2" style="width: 100%">
                <option value="">-- Select Country --</option>
                {% for c in countries_list %}
                    <option value="{{ c.id }}"
                            {% if shipping.country_id == c.id %}selected{% endif %}>
                        {{ c.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Building / Street</label>
            <textarea name="shipping_street1" class="form-control form-control-sm mb-2" rows="2">{{ shipping.street1 | hide_none }}</textarea>
            <textarea name="shipping_street2" class="form-control form-control-sm" rows="2">{{ shipping.street2 | hide_none }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>State</label>
                <select name="shipping_state" style="width: 100%"
                        class="form-control form-control-sm select2">
                    <option value="">select</option>
                    {% for c in shipping_state_list %}
                        <option value="{{ c.id }}"
                                {% if shipping.state_id == c.id %}selected{% endif %}>
                            {{ c.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group col-md-6">
                <label>City</label>
                <input type="text" name="shipping_city"
                       class="form-control form-control-sm"
                       value="{{ shipping.city| hide_none  }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>ZIP Code</label>
                <input type="text" name="shipping_zip"
                       class="form-control form-control-sm"
                       value="{{ shipping.zip | hide_none }}">
            </div>

            <div class="form-group col-md-6">
                <label>Phone</label>
                <input type="text" name="shipping_phone"
                       class="form-control form-control-sm"
                       value="{{ shipping.phone | hide_none }}">
            </div>
        </div>

        <div class="form-group">
            <label>Fax Number</label>
            <input type="text" name="shipping_fax"
                   class="form-control form-control-sm"
                   value="{{ shipping.fax| hide_none  }}">
        </div>

    </div>
</div>
{% block footer_script %}
<script>
$(document).ready(function () {

    // Initialize country select
    $('#billing_country, #shipping_country').select2({
        placeholder: "Search Country...",
        allowClear: true,
        minimumInputLength: 2,
        ajax: {
            url: "/common/list_countries/",
            dataType: "json",
            delay: 300,
            data: params => ({ q: params.term }),
            processResults: data => ({ results: data.results })
        }
    });

    // Initialize state select (normal select2 without AJAX)
    $('select[name="billing_state"], select[name="shipping_state"]').select2({
        placeholder: "Select State",
        allowClear: true,
        width: "100%"
    });

    // ----------- Load state list when country changes -----------
    function loadStates(countryId, stateSelect, selectedStateId = "") {
        if (!countryId) {
            stateSelect.empty().trigger("change");
            return;
        }

        $.ajax({
            url: `/common/list_states/?country_id=${countryId}`,
            type: "GET",
            success: function(data) {
                stateSelect.empty().append(`<option value="">Select</option>`);
                data.results.forEach(function(state) {
                    let option = new Option(state.text, state.id, false, false);
                    stateSelect.append(option);
                });

                // Auto select if value exists
                if (selectedStateId) {
                    stateSelect.val(selectedStateId).trigger("change");
                }
            }
        });
    }

    // B I L L I N G
    $('#billing_country').on('change', function () {
        let countryId = $(this).val();
        let selectedState = "{{ billing.state_id|default:'' }}";
        loadStates(countryId, $('select[name="billing_state"]'), selectedState);
    });

    // S H I P P I N G
    $('#shipping_country').on('change', function () {
        let countryId = $(this).val();
        let selectedState = "{{ shipping.state_id|default:'' }}";
        loadStates(countryId, $('select[name="shipping_state"]'), selectedState);
    });

});
</script>
{% endblock %}
