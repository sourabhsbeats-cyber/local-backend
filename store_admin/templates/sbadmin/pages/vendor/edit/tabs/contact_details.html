<h6 class="font-weight-bold mb-3">Contact Persons</h6>
<p class="text-muted small">Manage vendor contacts below.</p>

<!-- Contact List -->
<div id="contact-list">
</div>

<!-- Add Button -->
<button type="button" class="btn btn-link btn-sm mt-2" id="addContactBtn">
  + Add Contact
</button>

<!-- MODAL POPUP -->
<div class="modal fade" id="contactModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Contact Details</h5>
        <button class="close" data-dismiss="modal">&times;</button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="vendor_id" >
        <div class="form-row">
          <div class="form-group col-md-4">
            <label>First Name</label>
            <input type="text" id="contact_first_name" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Last Name</label>
            <input type="text" id="contact_last_name" class="form-control">
          </div>
            <div class="form-group col-md-4">
            <label>Role</label>
            <select id="contact_role" class="form-control">
              <option value="">Select</option>
              <option value="CEO">CEO</option>
            </select>
          </div>

        </div>

        <div class="form-row">
          <div class="form-group col-md-4">
            <label>Email</label>
            <input type="email" id="contact_email" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Phone</label>
            <input type="text" id="contact_phone" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Department</label>
            <select id="contact_department" class="form-control">
              <option value="">Select</option>
              <option value="Account Manager">Account Manager</option>
              <option value="Sales">Sales</option>
              <option value="Account (Finance)">Account (Finance)</option>
              <option value="Customer Service">Customer Service</option>
            </select>
          </div>

        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="contact_description" class="form-control" rows="2"></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="saveNewContactBtn">Save</button>
      </div>

    </div>
  </div>
</div>


<div class="modal fade" id="update_contactModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Contact Details</h5>
        <button class="close" data-dismiss="modal">&times;</button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="edit_vendor_id" value="{{vendor.id}}" />
          <input type="hidden" id="edit_contact_id" />

        <div class="form-row">
          <div class="form-group col-md-4">
            <label>First Name</label>
            <input type="text" id="edit_contact_first_name" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Last Name</label>
            <input type="text" id="edit_contact_last_name" class="form-control">
          </div>
            <div class="form-group col-md-4">
            <label>Role</label>
            <select id="edit_contact_role" class="form-control">
              <option value="">Select</option>
              <option value="CEO">CEO</option>
            </select>
          </div>

        </div>

        <div class="form-row">
          <div class="form-group col-md-4">
            <label>Email</label>
            <input type="email" id="edit_contact_email" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Phone</label>
            <input type="text" id="edit_contact_phone" class="form-control">
          </div>

          <div class="form-group col-md-4">
            <label>Department</label>
            <select id="edit_contact_department" class="form-control">
              <option value="">Select</option>
              <option value="Account Manager">Account Manager</option>
              <option value="Sales">Sales</option>
              <option value="Account (Finance)">Account (Finance)</option>
              <option value="Customer Service">Customer Service</option>
            </select>
          </div>

        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="edit_contact_description" class="form-control" rows="2"></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-primary" id="saveEditContactBtn">Update</button>
      </div>

    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const list = document.getElementById("contact-list");
    const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;
    const vendorId = {{ vendor.id }};
    const addModal = $("#contactModal");
    const editModal = $("#update_contactModal");

    const DETAIL_URL = "{% url 'get_single_vendor_contact' vendor.id 9999 %}";
    const UPDATE_URL = "{% url 'update_newvendor_contact' 9999 %}";
    const ADD_URL = "{% url 'add_newvendor_contact' vendor.id %}";

    const addFields = {
      first_name: "contact_first_name",
      last_name: "contact_last_name",
      email: "contact_email",
      phone: "contact_phone",
      department: "contact_department",
      description: "contact_description",
      role: "contact_role"
    };

    const editFields = {
      id: "edit_contact_id",
      first_name: "edit_contact_first_name",
      last_name: "edit_contact_last_name",
      email: "edit_contact_email",
      phone: "edit_contact_phone",
      department: "edit_contact_department",
      description: "edit_contact_description",
      role: "edit_contact_role"
    };

    const formToData = (fields) => {
      const fd = new FormData();
      Object.entries(fields).forEach(([key, id]) => {
        fd.append(key, document.getElementById(id).value);
      });
      return fd;
    };

    const resetForm = (fields) => {
      Object.values(fields).forEach(id => document.getElementById(id).value = "");
    };

    const alertBox = (title, message, icon) =>
      Swal.fire(title, message, icon);

    // ------------- LOAD -------------
    function loadContacts() {
      list.innerHTML = "";
      fetch("{% url 'get_all_vendor_contacts' vendor.id %}")
        .then(r => r.json())
        .then(data => {
          if (!data.status) return;
          data.data.forEach(c => {
            list.insertAdjacentHTML("beforeend", `
              <div class="contact-item border rounded p-2 mb-2 bg-light" data-id="${c.id}">
                <div class="d-flex justify-content-between">
                  <div>
                    <strong>${c.first_name} ${c.last_name}</strong>
                    <small class="text-muted d-block">${c.role || ""} | ${c.department || ""}</small>
                  </div>
                  <div>
                    <button type="button" class="btn btn-sm btn-primary edit-contact"><i class="fas fa-pen"></i></button>
                    <button type="button" class="btn btn-sm btn-danger delete-contact-btn"><i class="far fa-trash-alt"></i></button>
                  </div>
                </div>
              </div>`);
          });
        });
    }

    // ------------- ADD -------------
    document.getElementById("addContactBtn").onclick = () => addModal.modal("show");

    document.getElementById("saveNewContactBtn").onclick = () => {
      const fd = formToData(addFields);
      fd.append("vendor_id", vendorId);

      fetch(ADD_URL, { method: "POST", body: fd, headers: { "X-CSRFToken": csrf } })
        .then(r => r.json())
        .then(data => {
          alertBox(data.status ? "Added" : "Error", data.message, data.status ? "success" : "error");
          if (data.status) {
            addModal.modal("hide");
            resetForm(addFields);
            loadContacts();
          }
        });
    };

    // ------------- EDIT UI -------------
    list.addEventListener("click", (e) => {
      const parent = e.target.closest(".contact-item");
      if (!parent) return;
      const id = parent.dataset.id;

      if (e.target.closest(".edit-contact")) {
        fetch(DETAIL_URL.replace("9999", id))
          .then(r => r.json())
          .then(data => {
            if (!data.status) return;
            Object.entries(editFields).forEach(([key, idName]) => {
              document.getElementById(idName).value = data.data[key] || "";
            });
            editModal.modal("show");
          });
      }

      // ------------- DELETE -------------
      if (e.target.closest(".delete-contact-btn")) {
        Swal.fire({
          title: "Delete Contact?",
          text: "This cannot be undone.",
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: "Delete"
        }).then(res => {
          if (!res.value) return;
          fetch(`/vendor/contact/delete/${id}/${vendorId}`, {
            method: "DELETE",
            headers: { "X-CSRFToken": csrf }
          })
          .then(r => r.json())
          .then(data => {
            alertBox(data.status ? "Deleted" : "Error", data.message, data.status ? "success" : "error");
            if (data.status) loadContacts();
          });
        });
      }
    });

    // ------------- EDIT SUBMIT -------------
    document.getElementById("saveEditContactBtn").onclick = () => {
      const id = document.getElementById("edit_contact_id").value;
      const fd = formToData(editFields);

      fetch(UPDATE_URL.replace("9999", id), {
        method: "POST", body: fd, headers: { "X-CSRFToken": csrf }
      })
        .then(r => r.json())
        .then(data => {
          alertBox(data.status ? "Updated" : "Error", data.message, data.status ? "success" : "error");
          if (data.status) {
            editModal.modal("hide");
            resetForm(editFields);
            loadContacts();
          }
        });
    };

    loadContacts();
});
</script>
