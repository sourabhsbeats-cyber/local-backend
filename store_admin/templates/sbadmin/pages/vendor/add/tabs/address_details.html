<div class="row">
    <div class="col-md-6">
      <h6 class="mb-3 font-weight-bold">Billing Address</h6>
      <div class="form-group">
        <label>Attention</label>
        <input type="text" name="billing_attention_name"  class="form-control-sm form-control" placeholder="Enter attention name">
      </div>

      <div class="form-group">
        <label>Country / Region</label>
        <select name="billing_country" id="billing_country"
                class=" form-control select2 form-control-sm " style="width:100%">
            <option value="">-- Select Country --</option>
            {% for term in countries_list %}
                <option value="{{ term.id }}">{{ term.name }}</option>
            {% endfor %}
        </select>


      </div>

      <div class="form-group">
        <label>Building / Street</label>
        <textarea name="billing_street1" class="form-control-sm form-control mb-2" rows="2" placeholder="Street 1"></textarea>
        <textarea name="billing_street2" class="form-control-sm form-control" rows="2" placeholder="Street 2"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label>State</label>
          <select name="billing_state" style="width:100%"
                  id="billing_state" class="form-control select2 form-control-sm ">
            <option value="">Select country</option>
          </select>
        </div>
        <div class="form-group col-md-6">
          <label>City</label>
          <input type="text" class="form-control form-control-sm "
                 placeholder="City" name="billing_city">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label>ZIP Code</label>
          <input type="text" class="form-control form-control-sm " name="billing_zip" placeholder="Postal code">
        </div>
        <div class="form-group col-md-6">
          <label>Phone</label>
          <input type="text" name="billing_phone" class="form-control form-control-sm " placeholder="Phone number">
        </div>
      </div>

      <div class="form-group">
        <label>Fax Number</label>
        <input type="text" name="billing_fax" class="form-control-sm  form-control" placeholder="Fax number (optional)">
      </div>
    </div>
    <!-- Shipping Address -->
    <div class="col-md-6">
      <div class="d-flex align-items-center mb-3">
        <h6 class="mb-0 font-weight-bold">Shipping Address</h6>
        <a href="#" id="copyBilling" class="ml-2 text-primary small">
          <i class="fas fa-arrow-down"></i> Copy billing address
        </a>
      </div>

      <div class="form-group">
        <label>Attention</label>
        <input type="text" name="shipping_attention_name"  class="form-control-sm  form-control" placeholder="Enter attention name">
      </div>

      <div class="form-group">
        <label>Country / Region</label>
        <select name="shipping_country" id="shipping_country" style="width:100%"
               class="select2 form-control-sm select2-ajax form-control" >
            <option value="">-- Select Country --</option>
            {% for term in countries_list %}
                <option value="{{ term.id }}">{{ term.name }}  </option>
            {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Building / Street</label>
        <textarea name="shipping_street1"  class="form-control form-control-sm  mb-2" rows="2" placeholder="Street 1"></textarea>
        <textarea name="shipping_street2"  class="form-control form-control-sm " rows="2" placeholder="Street 2"></textarea>
      </div>

      <div class="form-row">
          <div class="form-group col-md-6">
          <label>State</label>
          <select name="shipping_state" style="width:100%"
                  id="shipping_state" class="select2 form-control-sm  form-control">
            <option value="">Select shipping country</option>
          </select>
        </div>
        <div class="form-group col-md-6">
          <label>City</label>
          <input name="shipping_city"  type="text" class="form-control-sm form-control" placeholder="City">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label>ZIP Code</label>
          <input name="shipping_zip"  type="text" class="form-control-sm form-control" placeholder="Postal code">
        </div>
        <div class="form-group col-md-6">
          <label>Phone</label>
          <input name="shipping_phone"  type="text" class="form-control-sm form-control" placeholder="Phone number">
        </div>
      </div>

      <div class="form-group">
        <label>Fax Number</label>
        <input name="shipping_fax"  type="text" class="form-control-sm form-control" placeholder="Fax number (optional)">
      </div>
    </div>
  </div>

{% block footer_script %}
<script>
  document.getElementById("copyBilling")?.addEventListener("click", function (e) {
    e.preventDefault();
    const billingFields = document.querySelectorAll(".col-md-6:first-child input, .col-md-6:first-child textarea, .col-md-6:first-child select");
    const shippingFields = document.querySelectorAll(".col-md-6:nth-child(2) input, .col-md-6:nth-child(2) textarea, .col-md-6:nth-child(2) select");
    billingFields.forEach((input, i) => {
      if (shippingFields[i]) shippingFields[i].value = input.value;
    });
  });

  function loadStates(countryId, targetDropdownId) {
    if (!countryId) {
        document.getElementById(targetDropdownId).innerHTML =
            '<option value="">Select state</option>';
        return;
    }

    fetch(`/get-states/${countryId}/`)
            .then(response => response.json())
            .then(data => {
                const dropdown = document.getElementById(targetDropdownId);
                dropdown.innerHTML = '<option value="">Select state</option>';

                data.states.forEach(state => {
                    const opt = document.createElement('option');
                    opt.value = state.id;
                    opt.textContent = state.name;
                    dropdown.appendChild(opt);
                });
            });
    }

    // Billing country change
    document.querySelector("select[name='billing[country]']").addEventListener("change", function () {
        loadStates(this.value, "billing_state");
    });

    // Shipping country change
    document.querySelector("select[name='shipping[country]']").addEventListener("change", function () {
        loadStates(this.value, "shipping_state");
    });

</script>
{% endblock  %}
