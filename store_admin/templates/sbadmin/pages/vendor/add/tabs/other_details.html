
<div >

    <div class="form-check mb-3 icheck-primary pl-0 no-select">
                <input class="form-check-input" type="checkbox" name="registeredBusiness"
                       id="registeredBusiness" />
                <label class="form-check-label" for="registeredBusiness">
                  This vendor has a registered business
                </label>
              </div>

              <div class="form-row">
                <div class="form-group col-md-4">
                  <label>Company ABN</label>
                  <input type="text" name="company_abn" class="form-control form-control-sm" placeholder="Enter ABN (11 digits)" />
                </div>
                <div class="form-group col-md-4">
                  <label>Company ACN</label>

                  <input type="text" name="company_acn" class="form-control  form-control-sm" placeholder="Enter ACN" />
                </div>
                <div class="form-group col-md-4">
                  <label>Payment Terms</label>

                    <select name="payment_term" class="form-control  form-control-sm" >
                        <option value="">-- Select Payment Term --</option>
                        {% for term in payment_terms %}
                            <option value="{{ term.id }}">{{ term.name }} ({{ term.frequency }} days)</option>
                        {% endfor %}
                    </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-4">
                     <label>Currency</label>
                     <select name="currency"
                             style="height:16px"
                             class="select2 form-control form-control-sm">
                        <option value="">-- Select Currency --</option>
                        {% for term in currency_list %}
                            <option value="{{ term.id }}">{{ term.currency }} - {{ term.currency_name }} </option>
                        {% endfor %}
                    </select>
                </div>


                  <div class="form-group col-md-4">
                     <label>Payment Method</label>
                     <select name="payment_method"
                             style="height:16px"
                             class="select2 form-control form-control-sm">
                        <option value="">-- Select Payment-type --</option>
                        <option value="Credit Card">Credit Card</option>
                       <option value="Direct">Direct</option>
                       <option value="Paypal">Paypal</option>
                         <option value="Wallet">Wallet</option>
                    </select>
                </div>
                <div class="form-group col-md-4">
                  <label>Documents</label>
                  <input type="file" name="documents" class="form-control-file">
                </div>
       </div>
</div>
