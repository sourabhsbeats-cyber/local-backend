 <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" name="registeredBusiness" id="registeredBusiness" />
                <label class="form-check-label" for="registeredBusiness">
                  This vendor has a registered business
                </label>
              </div>

              <div class="form-row">
                <div class="form-group col-md-4">
                  <label>Company ABN</label>
                  <input type="text" name="company_abn" class="form-control" placeholder="Enter ABN (11 digits)" />
                </div>
                <div class="form-group col-md-4">
                  <label>Company ACN</label>
                  <input type="text" name="company_acn" class="form-control" placeholder="Enter ACN" />
                </div>
                <div class="form-group col-md-4">
                  <label>Payment Terms</label>

                    <select name="payment_term" class="form-control" >
                        <option value="">-- Select Payment Term --</option>
                        {% for term in payment_terms %}
                            <option value="{{ term.id }}">{{ term.name }} ({{ term.frequency }} days)</option>
                        {% endfor %}
                    </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-6">
                     <label>Currency</label>
                     <select name="currency" style="height:22px" class="select2  form-control" >
                        <option value="">-- Select Currency --</option>
                        {% for term in currency_list %}
                            <option value="{{ term.id }}">{{ term.currency }} - {{ term.currency_name }} </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group col-md-6">
                  <label>Documents</label>
                  <input type="file" name="documents" class="form-control-file">
                </div>
              </div>
