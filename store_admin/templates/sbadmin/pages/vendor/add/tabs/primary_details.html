<div class="col-md-8">

</div>
<div class="form-row ">

        <option value="">Select</option>

    <div class="form-group col-md-5">

    </div>
    <div class="form-group col-md-5">

      <input type="text"  id="last_name" name="last_name" class="form-control form-control-sm" placeholder="Last Name" />
    </div>
</div>

          <div class="form-row">
            <div class="form-group col-md-3">
              <label>Company Name</label>
              <input type="text" name="company_name" class="form-control form-control-sm" placeholder="Registered company name" />
            </div>
              <div class="form-group col-md-3">
              <label>Company Type</label>
                   <select class="form-control form-control-sm" name="company_type">
        <option value="">Select</option>
        <option value="Local">Local</option>
        <option value="International">International</option>
      </select>

            </div>

            <div class="form-group col-md-3">
              <label ><strong>Display Name</strong><span class="text-danger">*</span></label>
                <div id="display-container">

              <input type="text" name="display_name" id="display_name" required class="typeahead form-control form-control-sm" placeholder="Select or type to add" />
            </div>
            </div>
           <div class="form-group col-md-3">
              <label ><strong>Vendor Code</strong><span class="text-danger">*</span></label>
              <input type="text" maxlength="5" name="vendor_code" required class="form-control form-control-sm" placeholder="Select or type to add" />
            </div>

          </div>

          <div class="form-row">
            <div class="form-group col-md-6">
              <label ><strong>Email Address</strong><span class="text-danger">*</span></label>
              <div class="input-group">
                  <input type="text" autocomplete="no-autofill-email" style="display:none">

                <input type="text" autocomplete="new-email" name="email_address" class="form-control form-control-sm" required placeholder="example@company.com" />
              </div>
            </div>
            <div class="form-group col-md-3">
              <label>Work Phone</label>
              <div class="input-group">
                <input type="text" maxlength="12"  name="work_phone" class="form-control form-control-sm" placeholder="Work Phone" />
              </div>
            </div>
            <div class="form-group col-md-3">
              <label>Mobile</label>
              <div class="input-group">
                <input type="text" name="mobile_number" maxlength="12"  class="form-control form-control-sm" placeholder="Mobile Number" />
              </div>
            </div>
</div>
    </div>

<script>
  function getSuggestions() {
    const sal = $("#salutation").val().trim();
    const f   = $("#first_name").val().trim();
    const l   = $("#last_name").val().trim();

    let opts = [];

    if (f && l) {
        const prefix = sal ? sal + " " : "";

        opts.push(prefix + f + " " + l);   // Mr. San Jio
        opts.push(prefix + l + ", " + f);  // Mr. Jio, San
    }


    return opts;
}

var suggestionEngine = new Bloodhound({
    datumTokenizer: Bloodhound.tokenizers.whitespace,
    queryTokenizer: Bloodhound.tokenizers.whitespace,
    identify: obj => obj
});

// Default suggestion logic (YOUR REQUIREMENT)
function showDefaults(query, sync) {
    if (query === "") {
        sync(getSuggestions());    // show all suggestions when empty
    } else {
        // filter suggestions
        const all = getSuggestions();
        const filtered = all.filter(item =>
            item.toLowerCase().includes(query.toLowerCase())
        );
        sync(filtered);
    }
}

$("#display_name").typeahead(
    {
        minLength: 0,
        highlight: true
    },
    {
        name: "display-names",
        source: showDefaults
    }
);

// Trigger update whenever name fields change
$("#salutation, #first_name, #last_name").on("input blur", function () {
    $("#display_name").typeahead('val', ''); // reset input
    $("#display_name").typeahead('open');    // show new defaults
});
</script>
