<div class="col-md-8">

<div class="form-row ">
     <div class="form-group col-md-2">
      <label class="text-danger">Vendor Type *</label>
      <select class="form-control form-control-sm " required name="vendor_type">
        <option value="">Select</option>
        <option value="Dropship">Dropship</option>
        <option value="Wholesale">Wholesale</option>
        <option value="both">both</option>
      </select>
    </div>
</div>
<div class="form-row ">
    <div class="form-group col-md-2">
      <label>Salutation</label>
      <select class="form-control form-control-sm" name="saluation">
        <option value="">Select</option>
        <option value="Mr.">Mr.</option>
        <option value="Mrs.">Mrs.</option>
        <option value="Ms.">Ms.</option>
        <option value="Dr.">Dr.</option>
      </select>
    </div>
    <div class="form-group col-md-5">
      <label>First Name</label>
      <input type="text" name="first_name" class="form-control form-control-sm" placeholder="First Name" />
    </div>
    <div class="form-group col-md-5">
      <label>Last Name</label>
      <input type="text" name="last_name" class="form-control form-control-sm" placeholder="Last Name" />
    </div>
</div>

          <div class="form-row">
            <div class="form-group col-md-3">
              <label>Company Name</label>
              <input type="text" name="company_name" class="form-control form-control-sm" placeholder="Registered company name" />
            </div>
              <div class="form-group col-md-3">
              <label>Company Type</label>
                   <select class="form-control form-control-sm" name="company_type">
        <option value="">Select</option>
        <option value="Local">Local</option>
        <option value="International">International</option>
      </select>

            </div>

            <div class="form-group col-md-3">
              <label class="text-danger">Display Name *</label>
              <input type="text" name="display_name" required class="form-control form-control-sm" placeholder="Select or type to add" />
            </div>
           <div class="form-group col-md-3">
              <label class="text-danger">Vendor Code*</label>
              <input type="text" maxlength="5" name="vendor_code" required class="form-control form-control-sm" placeholder="Select or type to add" />
            </div>

          </div>

          <div class="form-row">
            <div class="form-group col-md-6">
              <label class="text-danger">Email Address *</label>
              <div class="input-group">
                  <input type="text" autocomplete="no-autofill-email" style="display:none">

                <input type="text" autocomplete="new-email" name="email_address" class="form-control form-control-sm" required placeholder="example@company.com" />
              </div>
            </div>
            <div class="form-group col-md-3">
              <label>Work Phone</label>
              <div class="input-group">
                <input type="text" maxlength="12"  name="work_phone" class="form-control form-control-sm" placeholder="Work Phone" />
              </div>
            </div>
            <div class="form-group col-md-3">
              <label>Mobile</label>
              <div class="input-group">
                <input type="text" name="mobile_number" maxlength="12"  class="form-control form-control-sm" placeholder="Mobile Number" />
              </div>
            </div>
</div>
    </div>
