<!-- ============================ -->
<!-- CONTACT PERSONS (EDIT PAGE) -->
<!-- ============================ -->

<h5 class="font-weight-bold mb-3">Contact Persons</h5>
<p class="text-muted small">Add or edit vendor contact persons.</p>

<div id="contact-list">
  {% for c in contacts %}
  <div class="contact-item border rounded p-2 mb-2 bg-light"
       data-id="{{ c.id }}"
       data-first="{{ c.first_name }}"
       data-last="{{ c.last_name }}"
       data-email="{{ c.email }}"
       data-phone="{{ c.phone }}"
       data-dept="{{ c.department }}"
       data-desc="{{ c.description }}">

      <div class="d-flex justify-content-between">
          <div>
              <strong>{{ c.first_name }} {{ c.last_name }}</strong>
              <small class="text-muted d-block">{{ c.department }}</small>
          </div>

          <div>
              <button type="button" class="btn btn-sm btn-primary edit-contact">
                  <i class="fas fa-edit"></i>
              </button>
              <button type="button" class="btn btn-sm btn-danger delete-contact"
                      data-id="{{ c.id }}">
                  <i class="far fa-trash-alt"></i>
              </button>
          </div>
      </div>

      <!-- Hidden inputs for backend POST -->
      <input type="hidden" name="contacts[{{ forloop.counter0 }}][id]" value="{{ c.id }}">
      <input type="hidden" name="contacts[{{ forloop.counter0 }}][first_name]" value="{{ c.first_name }}">
      <input type="hidden" name="contacts[{{ forloop.counter0 }}][last_name]" value="{{ c.last_name }}">
      <input type="hidden" name="contacts[{{ forloop.counter0 }}][email]" value="{{ c.email }}">
      <input type="hidden" name="contacts[{{ forloop.counter0 }}][phone]" value="{{ c.phone }}">
      <input type="hidden" name="contacts[{{ forloop.counter0 }}][department]" value="{{ c.department }}">
      <input type="hidden" name="contacts[{{ forloop.counter0 }}][description]" value="{{ c.description }}">
  </div>
  {% endfor %}
</div>

<button type="button" class="btn btn-success btn-sm mt-2" id="addContactBtn">
  + Add Contact
</button>

<!-- CONTACT MODAL -->
<div class="modal fade" id="contactModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Contact Details</h5>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="contact_id">

        <div class="form-group">
          <label>Department</label>
          <select class="form-control" id="contact_department">
            <option value="">Select</option>
            <option>Account Manager</option>
            <option>Sales</option>
            <option>Account (Finance)</option>
            <option>Customer Service</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group col-md-6">
            <label>First Name</label>
            <input type="text" id="contact_first_name" class="form-control">
          </div>
          <div class="form-group col-md-6">
            <label>Last Name</label>
            <input type="text" id="contact_last_name" class="form-control">
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="text" id="contact_email" class="form-control">
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="contact_phone" class="form-control">
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea class="form-control" id="contact_desc" rows="2"></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          Cancel
        </button>
        <button type="button" class="btn btn-primary" id="save-contact">
          Save
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
(function() {

  const list = document.getElementById("contact-list");
  const modal = $("#contactModal");

  // -------------------------
  // ADD CONTACT
  // -------------------------
  document.getElementById("addContactBtn").onclick = () => {
      fillModal({});
      modal.modal("show");
  };

  // -------------------------
  // EDIT CONTACT
  // -------------------------
  list.addEventListener("click", function(e) {
      const editBtn = e.target.closest(".edit-contact");
      if (!editBtn) return;

      const block = editBtn.closest(".contact-item");

      fillModal({
          id: block.dataset.id,
          dept: block.dataset.dept,
          first: block.dataset.first,
          last: block.dataset.last,
          email: block.dataset.email,
          phone: block.dataset.phone,
          desc: block.dataset.desc
      });

      modal.modal("show");
  });

  // -------------------------
  // SAVE CONTACT (NO FORM SUBMIT)
  // -------------------------
  document.getElementById("save-contact").onclick = () => {

      const c = {
          id: document.getElementById("contact_id").value,
          dept: document.getElementById("contact_department").value,
          first: document.getElementById("contact_first_name").value,
          last: document.getElementById("contact_last_name").value,
          email: document.getElementById("contact_email").value,
          phone: document.getElementById("contact_phone").value,
          desc: document.getElementById("contact_desc").value
      };

      if (c.id) updateContactUI(c);
      else addContactUI(c);

      modal.modal("hide");
  };

  // -------------------------
  // DELETE CONTACT
  // -------------------------
  list.addEventListener("click", function(e) {

      const delBtn = e.target.closest(".delete-contact");
      if (!delBtn) return;

      const block = delBtn.closest(".contact-item");

      Swal.fire({
          title: "Delete Contact?",
          text: "This action cannot be undone.",
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: "Delete"
      }).then(result => {

          if (!result.isConfirmed) return;

          block.remove();
          renumber();
      });
  });

  // -------------------------
  // FILL MODAL
  // -------------------------
  function fillModal(c) {
      document.getElementById("contact_id").value = c.id || "";
      document.getElementById("contact_department").value = c.dept || "";
      document.getElementById("contact_first_name").value = c.first || "";
      document.getElementById("contact_last_name").value = c.last || "";
      document.getElementById("contact_email").value = c.email || "";
      document.getElementById("contact_phone").value = c.phone || "";
      document.getElementById("contact_desc").value = c.desc || "";
  }

  // -------------------------
  // ADD TO UI
  // -------------------------
  function addContactUI(c) {
      const idx = list.querySelectorAll(".contact-item").length;

      const html = `
          <div class="contact-item border rounded p-2 mb-2 bg-light"
               data-id=""
               data-first="${c.first}"
               data-last="${c.last}"
               data-email="${c.email}"
               data-phone="${c.phone}"
               data-dept="${c.dept}"
               data-desc="${c.desc}">

              <div class="d-flex justify-content-between">
                <div>
                    <strong>${c.first} ${c.last}</strong>
                    <small class="text-muted d-block">${c.dept}</small>
                </div>
                <div>
                    <button type="button" class="btn btn-sm btn-primary edit-contact">
                      <i class="fas fa-edit"></i>
                    </button>
                    <button type="button" class="btn btn-sm btn-danger delete-contact">
                      <i class="far fa-trash-alt"></i>
                    </button>
                </div>
              </div>

              <input type="hidden" name="contacts[${idx}][id]" value="">
              <input type="hidden" name="contacts[${idx}][first_name]" value="${c.first}">
              <input type="hidden" name="contacts[${idx}][last_name]" value="${c.last}">
              <input type="hidden" name="contacts[${idx}][email]" value="${c.email}">
              <input type="hidden" name="contacts[${idx}][phone]" value="${c.phone}">
              <input type="hidden" name="contacts[${idx}][department]" value="${c.dept}">
              <input type="hidden" name="contacts[${idx}][description]" value="${c.desc}">
          </div>
        `;

      list.insertAdjacentHTML("beforeend", html);
      renumber();
  }

  // -------------------------
  // UPDATE UI
  // -------------------------
  function updateContactUI(c) {
      const block = list.querySelector(`.contact-item[data-id="${c.id}"]`);
      if (!block) return;

      block.dataset.first = c.first;
      block.dataset.last = c.last;
      block.dataset.email = c.email;
      block.dataset.phone = c.phone;
      block.dataset.dept = c.dept;
      block.dataset.desc = c.desc;

      block.querySelector("strong").innerText = `${c.first} ${c.last}`;
      block.querySelector("small").innerText = c.dept;

      block.querySelector(`input[name*="[first_name]"]`).value = c.first;
      block.querySelector(`input[name*="[last_name]"]`).value = c.last;
      block.querySelector(`input[name*="[email]"]`).value = c.email;
      block.querySelector(`input[name*="[phone]"]`).value = c.phone;
      block.querySelector(`input[name*="[department]"]`).value = c.dept;
      block.querySelector(`input[name*="[description]"]`).value = c.desc;
  }

  // -------------------------
  // RENUMBER INPUT INDEXES
  // -------------------------
  function renumber() {
      document.querySelectorAll("#contact-list .contact-item").forEach((item, idx) => {
          item.querySelector("h6") && (item.querySelector("h6").innerText = `CONTACT ${idx + 1}`);

          item.querySelectorAll("input").forEach(input => {
              input.name = input.name.replace(/contacts\[\d+\]/, `contacts[${idx}]`);
          });
      });
  }

})();
</script>
