<!-- ============================== -->
<!-- BANK DETAILS (SAFE NO-SUBMIT) -->
<!-- ============================== -->

<h6 class="font-weight-bold mb-3">Bank Details</h6>
<p class="text-muted small">Add or update your vendor bank accounts.</p>

<div id="bank-list">

  {% for b in banks %}
  <div class="bank-item border p-3 rounded bg-light mb-2"
       data-id="{{ b.id }}"
       data-holder="{{ b.account_holder }}"
       data-bank="{{ b.bank_name }}"
       data-acct="{{ b.account_number }}"
       data-bic="{{ b.bic }}">

      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="text-muted mb-0">BANK {{ forloop.counter }}</h6>

        <div>
          <button type="button" class="btn btn-primary btn-sm edit-bank mr-1">
            <i class="fas fa-edit"></i>
          </button>

          <button type="button" class="btn btn-danger btn-sm delete-bank"
                  data-id="{{ b.id }}">
            <i class="far fa-trash-alt"></i>
          </button>
        </div>
      </div>

      <div class="small">
        <strong>Holder:</strong> {{ b.account_holder }}<br>
        <strong>Bank:</strong> {{ b.bank_name }}<br>
        <strong>Account:</strong> ***********<br>
        <strong>BIC:</strong> {{ b.bic }}
      </div>

      <!-- Hidden Inputs for backend -->
      <input type="hidden" name="banks[{{ forloop.counter0 }}][id]" value="{{ b.id }}">
      <input type="hidden" name="banks[{{ forloop.counter0 }}][holder]" value="{{ b.account_holder }}">
      <input type="hidden" name="banks[{{ forloop.counter0 }}][bank_name]" value="{{ b.bank_name }}">
      <input type="hidden" name="banks[{{ forloop.counter0 }}][acct]" value="{{ b.account_number }}">
      <input type="hidden" name="banks[{{ forloop.counter0 }}][acct_confirm]" value="{{ b.account_number }}">
      <input type="hidden" name="banks[{{ forloop.counter0 }}][bic]" value="{{ b.bic }}">
  </div>
  {% endfor %}

</div>

<button type="button" id="addBankBtn" class="btn-sm btn btn-link px-0 mt-2">
  <i class="fas fa-plus"></i> Add New Bank
</button>


<!-- ================================= -->
<!-- BANK MODAL -->
<!-- ================================= -->

<div class="modal  fade" id="bankModal">
  <div class="modal-dialog ">
    <div class="modal-content">

      <div class="modal-header">
        <h6 class="modal-title">Bank Details</h6>
        <button type="button" class="close" data-dismiss="modal">&times;</button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="bank_id">

           <div class="row">
              <div class="col-sm-6">
 <div class="form-group">
          <label>Account Holder Name</label>
          <input placeholder="Account holder name"  type="text" id="bank_holder" class="form-control-sm form-control">
        </div>
              </div>
              <div class="col-sm-6">
<div class="form-group">
          <label>Bank Name</label>
          <input placeholder="Bank Name"  type="text" id="bank_name" class="form-control-sm form-control">
        </div>
              </div>
          </div>


        <div class="form-group">
          <label>Account Number</label>
          <input placeholder=" Bank Account Number" type="password"
                 id="bank_acct" class="form-control-sm form-control">
        </div>

        <div class="form-group">
          <label>Re-enter Account Number</label>
          <input placeholder="Confirm Bank Account Number" type="password" id="bank_acct_confirm" class="form-control-sm form-control">
        </div>

        <div class="form-group">
          <label>BIC</label>
          <input placeholder="BIC Details" type="text" id="bank_bic" class="form-control-sm form-control">
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-sm btn-secondary" data-dismiss="modal">
          Cancel
        </button>

        <button type="button" class="btn btn-sm btn-primary" id="saveBankBtn">
          Save
        </button>
      </div>

    </div>
  </div>
</div>



<!-- ================================= -->
<!-- JS LOGIC (NO FORM SUBMISSION)    -->
<!-- ================================= -->

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
(function () {

  const list = document.getElementById("bank-list");
  const modal = $("#bankModal");

  // Open Add Modal
  document.getElementById("addBankBtn").onclick = function () {
    fillModal({});
    modal.modal("show");
  };


  // OPEN EDIT MODAL
  list.addEventListener("click", function (e) {
    const editBtn = e.target.closest(".edit-bank");
    if (!editBtn) return;

    const item = editBtn.closest(".bank-item");

    fillModal({
      id: item.dataset.id,
      holder: item.dataset.holder,
      bank: item.dataset.bank,
      acct: item.dataset.acct,
      bic: item.dataset.bic
    });

    modal.modal("show");
  });


  // SAVE BANK
  document.getElementById("saveBankBtn").onclick = function () {

    const b = {
      id: document.getElementById("bank_id").value,
      holder: document.getElementById("bank_holder").value,
      bank: document.getElementById("bank_name").value,
      acct: document.getElementById("bank_acct").value,
      acct_confirm: document.getElementById("bank_acct_confirm").value,
      bic: document.getElementById("bank_bic").value
    };

    if (b.acct !== b.acct_confirm) {
      Swal.fire("Error", "Account numbers do not match.", "error");
      return;
    }

    if (!b.id) addBankUI(b);
    else updateBankUI(b);

    modal.modal("hide");
  };


  // DELETE BANK
  list.addEventListener("click", function (e) {

    const delBtn = e.target.closest(".delete-bank");
    if (!delBtn) return;

    const item = delBtn.closest(".bank-item");
    const bankId = item.dataset.id;

    Swal.fire({
      title: "Delete Bank?",
      text: "This action cannot be undone.",
      icon: "warning",
      showCancelButton: true,
      confirmButtonText: "Delete"
    }).then(result => {

      if (!result.isConfirmed) return;

      item.remove();
      renumber();
    });
  });


  // FILL MODAL
  function fillModal(b) {
    document.getElementById("bank_id").value = b.id || "";
    document.getElementById("bank_holder").value = b.holder || "";
    document.getElementById("bank_name").value = b.bank || "";
    document.getElementById("bank_acct").value = b.acct || "";
    document.getElementById("bank_acct_confirm").value = b.acct || "";
    document.getElementById("bank_bic").value = b.bic || "";
  }


  // ADD NEW BANK UI
  function addBankUI(b) {

    const idx = list.querySelectorAll(".bank-item").length;

    const html = `
      <div class="bank-item border p-3 rounded bg-light mb-2"
           data-id=""
           data-holder="${b.holder}"
           data-bank="${b.bank}"
           data-acct="${b.acct}"
           data-bic="${b.bic}">

        <div class="d-flex justify-content-between align-items-center mb-2">
          <h6 class="text-muted mb-0">BANK ${idx + 1}</h6>

          <div>
            <button type="button" class="btn btn-sm btn-primary edit-bank mr-1">
              <i class="fas fa-edit"></i>
            </button>

            <button type="button" class="btn btn-sm btn-danger delete-bank">
              <i class="far fa-trash-alt"></i>
            </button>
          </div>
        </div>

        <div class="small">
          <strong>Holder:</strong> ${b.holder}<br>
          <strong>Bank:</strong> ${b.bank}<br>
          <strong>Account:</strong> ***********<br>
          <strong>BIC:</strong> ${b.bic}
        </div>

        <input type="hidden" name="banks[${idx}][id]" value="">
        <input type="hidden" name="banks[${idx}][holder]" value="${b.holder}">
        <input type="hidden" name="banks[${idx}][bank_name]" value="${b.bank}">
        <input type="hidden" name="banks[${idx}][acct]" value="${b.acct}">
        <input type="hidden" name="banks[${idx}][acct_confirm]" value="${b.acct}">
        <input type="hidden" name="banks[${idx}][bic]" value="${b.bic}">
      </div>
    `;

    list.insertAdjacentHTML("beforeend", html);
    renumber();
  }


  // UPDATE UI
  function updateBankUI(b) {

    const item = list.querySelector(`.bank-item[data-id="${b.id}"]`);
    if (!item) return;

    item.dataset.holder = b.holder;
    item.dataset.bank = b.bank;
    item.dataset.acct = b.acct;
    item.dataset.bic = b.bic;

    item.querySelector(".small").innerHTML = `
      <strong>Holder:</strong> ${b.holder}<br>
      <strong>Bank:</strong> ${b.bank}<br>
      <strong>Account:</strong> ***********<br>
      <strong>BIC:</strong> ${b.bic}
    `;

    // update hidden inputs
    item.querySelector(`input[name*="[holder]"]`).value = b.holder;
    item.querySelector(`input[name*="[bank_name]"]`).value = b.bank;
    item.querySelector(`input[name*="[acct]"]`).value = b.acct;
    item.querySelector(`input[name*="[acct_confirm]"]`).value = b.acct;
    item.querySelector(`input[name*="[bic]"]`).value = b.bic;
  }


  // RENUMBER
  function renumber() {
    document.querySelectorAll("#bank-list .bank-item").forEach((item, idx) => {
      item.querySelector("h6").innerText = `BANK ${idx + 1}`;

      item.querySelectorAll("input").forEach(input => {
        input.name = input.name.replace(/banks\[\d+\]/, `banks[${idx}]`);
      });
    });
  }

})();
</script>
