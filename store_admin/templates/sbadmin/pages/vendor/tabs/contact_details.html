 <h5 class="font-weight-bold mb-3">Contact Persons</h5>
  <p class="text-muted small">Add or manage your vendor’s key contact persons and their roles.</p>

  <div id="contacts-container"></div>
  <button type="button" id="add-contact" class="btn btn-link px-0 mt-2">
    <i class="fas fa-plus"></i> Add New Contact
  </button>

 <script>
(function () {
  const contactsContainer = document.getElementById('contacts-container');
  const addBtn = document.getElementById('add-contact');

  // template for each contact row
  const contactTpl = (idx, defaultDept = "") => `
    <div class="contact-block border rounded p-3 mb-3 bg-light">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0 text-muted">CONTACT ${idx + 1}</h6>
        ${idx === 0 ? "" : `<button type="button" class="btn btn-sm btn-link text-danger contact-delete"><i class="far fa-trash-alt"></i> Delete</button>`}
      </div>

      <div class="form-row">
        <div class="form-group col-md-4">
          <label>Department / Role</label>
          <select class="form-control" name="contacts[${idx}][department]">
            <option value="">Select</option>
            <option ${defaultDept === "Account Manager" ? "selected" : ""}>Account Manager</option>
            <option ${defaultDept === "Sales" ? "selected" : ""}>Sales</option>
            <option ${defaultDept === "Account (Finance)" ? "selected" : ""}>Account (Finance)</option>
            <option ${defaultDept === "Customer Service" ? "selected" : ""}>Customer Service</option>
          </select>
        </div>

        <div class="form-group col-md-4">
          <label>Email</label>
          <input type="email" class="form-control" name="contacts[${idx}][email]" placeholder="Enter Email">
        </div>

        <div class="form-group col-md-4">
          <label>Phone No</label>
          <input type="text" class="form-control" name="contacts[${idx}][phone]" placeholder="Enter Phone">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-3">
          <label>First Name</label>
          <input type="text" class="form-control" name="contacts[${idx}][first_name]" placeholder="Enter First Name">
        </div>
        <div class="form-group col-md-3">
          <label>Last Name</label>
          <input type="text" class="form-control" name="contacts[${idx}][last_name]" placeholder="Enter Last Name">
        </div>
        <div class="form-group col-md-6">
          <label>Purpose / Description</label>
          <textarea class="form-control" name="contacts[${idx}][description]" rows="1" placeholder="Describe role or purpose"></textarea>
        </div>
      </div>
    </div>
  `;

  // function to add a contact
  function addContact(defaultDept = "") {
    const idx = contactsContainer.querySelectorAll('.contact-block').length;
    contactsContainer.insertAdjacentHTML('beforeend', contactTpl(idx, defaultDept));
  }

  // initialize with the default 4 roles you mentioned
  const defaults = [
    "Account Manager",
    /*"Sales",
    "Account (Finance)",
    "Customer Service"*/
  ];
  defaults.forEach(d => addContact(d));

  // add button
  addBtn.addEventListener('click', () => addContact());

  // delete contact
  contactsContainer.addEventListener('click', (e) => {
    if (e.target.closest('.contact-delete')) {
      e.target.closest('.contact-block').remove();
      renumberContacts();
    }
  });

  // renumber CONTACT n labels after deletion
  function renumberContacts() {
    contactsContainer.querySelectorAll('.contact-block').forEach((block, i) => {
      block.querySelector('h6').textContent = `CONTACT ${i + 1}`;
    });
  }
})();
</script>
