 <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="registeredBusiness" />
                <label class="form-check-label" for="registeredBusiness">
                  This vendor has a registered business
                </label>
              </div>

              <div class="form-row">
                <div class="form-group col-md-4">
                  <label>Company ABN</label>
                  <input type="text" name="company_abn" class="form-control" placeholder="Enter ABN (11 digits)" />
                </div>
                <div class="form-group col-md-4">
                  <label>Company ACN</label>
                  <input type="text" name="company_acn" class="form-control" placeholder="Enter ACN" />
                </div>
                <div class="form-group col-md-4">
                  <label>Payment Terms</label>
                  <select name="payment_terms" class="form-control">
                    <option>Paid</option>
                    <option>Net 15</option>
                    <option>Net 30</option>
                  </select>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group col-md-6">
                  <label>Currency</label>
                  <select name="currency" class="form-control">
                    <option>AUD - Australian Dollar</option>
                    <option>USD - US Dollar</option>
                    <option>INR - Indian Rupee</option>
                  </select>
                </div>
                <div class="form-group col-md-6">
                  <label>Documents</label>
                  <input type="file" name="documents" class="form-control-file">
                </div>
              </div>
