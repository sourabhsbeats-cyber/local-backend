<div id="bank-section" class="pb-2">
  <div id="banks-container"></div>
  <button type="button" id="add-bank" class="btn btn-link px-0">
    <i class="fas fa-plus"></i> Add New Bank
  </button>
</div>

<script>
(function () {
  const banksContainer = document.getElementById('banks-container');
  const addBtn = document.getElementById('add-bank');

  // template for a bank block
  const bankTpl = (idx) => `
    <div class="bank-block py-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0 text-muted">BANK ${idx + 1}</h6>
        ${idx === 0 ? "" : `<button type="button" class="btn btn-sm btn-link text-muted bank-delete"><i class="far fa-trash-alt"></i> Delete</button>`}
      </div>

      <div class="form-group row">
        <label class="col-sm-3 col-form-label">Account Holder Name</label>
        <div class="col-sm-9">
          <input name="banks[${idx}][holder]" type="text" class="form-control" placeholder="">
        </div>
      </div>

      <div class="form-group row">
        <label class="col-sm-3 col-form-label">Bank Name</label>
        <div class="col-sm-9">
          <input name="banks[${idx}][bank_name]" type="text" class="form-control" placeholder="">
        </div>
      </div>

      <div class="form-group row">
        <label class="col-sm-3 col-form-label ">Account Number*</label>
        <div class="col-sm-9">
          <div class="input-group">
            <input name="banks[${idx}][acct]" type="password" class="form-control bank-acct">
            <div class="input-group-append">
              <button type="button" class="btn btn-outline-secondary toggle-visibility" tabindex="-1">
                <i class="far fa-eye"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-group row">
        <label class="col-sm-3 col-form-label ">Re-enter Account Number*</label>
        <div class="col-sm-9">
          <input name="banks[${idx}][acct_confirm]" type="password" class="form-control bank-acct-confirm">
          <small class="text-danger d-none mismatch-hint"><i class="fas fa-exclamation-circle"></i> Account numbers do not match.</small>
        </div>
      </div>

      <div class="form-group row">
        <label class="col-sm-3 col-form-label ">Bank Identifier Code*</label>
        <div class="col-sm-9">
          <input name="banks[${idx}][bic]" type="text" class="form-control" placeholder="">
        </div>
      </div>

      <hr class="mt-4">
    </div>
  `;

  // add a block
  function addBank() {
    const idx = banksContainer.querySelectorAll('.bank-block').length;
    banksContainer.insertAdjacentHTML('beforeend', bankTpl(idx));
  }

  // re-index labels “BANK n” and name attributes after delete
  function renumber() {
    const blocks = banksContainer.querySelectorAll('.bank-block');
    blocks.forEach((block, i) => {
      block.querySelector('h6').innerText = `BANK ${i + 1}`;
      block.querySelectorAll('input').forEach(inp => {
        const name = inp.getAttribute('name').replace(/banks\[\d+\]/, `banks[${i}]`);
        inp.setAttribute('name', name);
      });
      const del = block.querySelector('.bank-delete');
      if (del) del.classList.toggle('d-none', i === 0); // first block no delete
    });
  }

  // init with two banks like screenshot
  addBank();
  // add button
  addBtn.addEventListener('click', addBank);

  // delegate events for delete, eye toggle, and confirm validation
  banksContainer.addEventListener('click', function (e) {
    // delete
    if (e.target.closest('.bank-delete')) {
      const block = e.target.closest('.bank-block');
      block.parentNode.removeChild(block);
      renumber();
    }
    // show/hide account number
    if (e.target.closest('.toggle-visibility')) {
      const btn = e.target.closest('.toggle-visibility');
      const input = btn.closest('.input-group').querySelector('input');
      const icon = btn.querySelector('i');
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    }
  });

  // live validation for account confirm
  banksContainer.addEventListener('input', function (e) {
    if (e.target.classList.contains('bank-acct') || e.target.classList.contains('bank-acct-confirm')) {
      const block = e.target.closest('.bank-block');
      const a = block.querySelector('.bank-acct').value.trim();
      const b = block.querySelector('.bank-acct-confirm').value.trim();
      const hint = block.querySelector('.mismatch-hint');
      if (b.length === 0) {
        hint.classList.add('d-none');
      } else {
        hint.classList.toggle('d-none', a === b);
      }
    }
  });
})();
</script>
